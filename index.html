<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa – Residentes em Resistência</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #2c3e50;
    --accent: #c0392b;
    --bg: #fdfcfb;
    --text: #333;
    --gold: #d4af37;
    --whatsapp: #25d366;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Lora', serif;
    line-height: 1.6;
    padding: 20px;
  }
  .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
  header { text-align: center; margin-bottom: 40px; border-bottom: 2px solid var(--gold); padding-bottom: 20px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
  
  .status-bar { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; margin-bottom: 20px; color: #666; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
  .dot.online { background: #27ae60; box-shadow: 0 0 8px #27ae60; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; margin-bottom: 30px; }
  .num-btn {
    aspect-ratio: 1;
    border: 1px solid #ddd;
    background: white;
    font-family: 'Lora', serif;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .num-btn:hover:not(.occupied) { border-color: var(--primary); transform: translateY(-2px); }
  .num-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
  .num-btn.occupied { background: #f0f0f0; color: #bbb; cursor: not-allowed; text-decoration: line-through; }
  
  .form-group { margin-bottom: 20px; }
  label { display: block; margin-bottom: 5px; font-weight: 600; color: var(--primary); }
  input { width: 100%; padding: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; border-radius: 4px; }
  
  .buy-btn {
    width: 100%; padding: 15px; background: var(--primary); color: white; border: none;
    font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: background 0.3s;
    font-family: 'Playfair Display', serif;
  }
  .buy-btn:hover { background: #1a252f; }
  .buy-btn:disabled { background: #ccc; cursor: not-allowed; }

  .modal-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000;
  }
  .modal { background: white; padding: 40px; max-width: 450px; width: 90%; text-align: center; border-radius: 8px; }
  .pix-box { background: #f9f9f9; padding: 20px; border: 2px dashed var(--gold); margin: 20px 0; border-radius: 8px; }
  .pix-key { font-family: monospace; font-size: 1.2rem; font-weight: bold; color: var(--primary); margin: 10px 0; word-break: break-all; }
  .copy-btn { background: none; border: 1px solid var(--primary); padding: 5px 15px; cursor: pointer; font-size: 0.9rem; }
  
  .whatsapp-btn {
    display: block; background: var(--whatsapp); color: white; padding: 15px; 
    text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 15px;
    transition: transform 0.2s;
  }
  .whatsapp-btn:hover { transform: scale(1.03); background: #1ebe57; }
  
  .close-modal { margin-top: 20px; background: none; border: none; color: #888; cursor: pointer; text-decoration: underline; }

  .loading-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
  }
  .loading-overlay.hidden { display: none; }
  .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--primary); color: white; padding: 12px 24px; border-radius: 30px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 3000;
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p style="margin-top:15px; font-family:'Playfair Display'">Sincronizando Rifa...</p>
</div>

<div class="container">
  <header>
    <h1>Rifa Solidária</h1>
    <p>Residentes em Resistência</p>
  </header>

  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Carregando dados...</span>
  </div>

  <div class="grid" id="numbersGrid"></div>

  <div class="form-group">
    <label>Seu Nome Completo:</label>
    <input type="text" id="userName" placeholder="Ex: Nome do Comprador">
  </div>
  <div class="form-group">
    <label>Seu WhatsApp:</label>
    <input type="text" id="userPhone" placeholder="(41) 99999-9999">
  </div>

  <button class="buy-btn" id="confirmBtn" onclick="finalizePurchase()" disabled>
    Escolha seus números (R$ 15,00 cada)
  </button>
</div>

<div class="modal-overlay" id="pixModal">
  <div class="modal">
    <div style="font-size: 3rem;">🎟️</div>
    <h2>Reserva confirmada!</h2>
    <p>Para garantir os seus números, faça o Pix e envie o comprovante.</p>
    
    <div class="pix-box">
      <div style="font-size: 0.8rem; color: #666;">Chave Pix (CPF)</div>
      <div class="pix-key" id="pixKey">094.736.199-52</div>
      <button class="copy-btn" onclick="copyPix()">📋 Copiar Chave Pix</button>
    </div>

    <div id="summaryBox" style="margin-bottom: 15px; font-weight: bold; color: var(--primary); font-size: 1.1rem;"></div>

    <a id="wppBtn" class="whatsapp-btn" target="_blank">
      Enviar Comprovante (WhatsApp) 📱
    </a>

    <button class="close-modal" onclick="closeModal()">✕ Fechar janela</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBkf-iRSkXntSERzft_b16zT1VeJly1c6A",
    authDomain: "rifa--residentes.firebaseapp.com",
    databaseURL: "https://rifa--residentes-default-rtdb.firebaseio.com",
    projectId: "rifa--residentes",
    storageBucket: "rifa--residentes.firebasestorage.app",
    messagingSenderId: "844916919267",
    appId: "1:844916919267:web:ac5233634e9e4a3b7654a9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  const PIX_KEY = "094.736.199-52";
  const WHATSAPP_NUMBER = "554199826640";
  const PRICE = 15.00;

  let selectedNumbers = [];
  let occupiedNumbers = {};

  const grid = document.getElementById("numbersGrid");
  const confirmBtn = document.getElementById("confirmBtn");

  function renderGrid() {
    grid.innerHTML = "";
    for (let i = 1; i <= 200; i++) {
      const n = i.toString().padStart(2, '0');
      const btn = document.createElement("button");
      btn.className = "num-btn";
      
      if (occupiedNumbers[n]) {
        btn.classList.add("occupied");
        btn.disabled = true;
      }
      if (selectedNumbers.includes(n)) {
        btn.classList.add("selected");
      }
      
      btn.textContent = n;
      btn.onclick = () => toggleNumber(n);
      grid.appendChild(btn);
    }
  }

  function toggleNumber(n) {
    const idx = selectedNumbers.indexOf(n);
    if (idx > -1) selectedNumbers.splice(idx, 1);
    else selectedNumbers.push(n);
    
    confirmBtn.disabled = selectedNumbers.length === 0;
    confirmBtn.textContent = selectedNumbers.length > 0 
      ? `Reservar ${selectedNumbers.length} número(s) - R$ ${(selectedNumbers.length * PRICE).toFixed(2)}`
      : "Escolha seus números";
    renderGrid();
  }

  onValue(ref(db, 'numbers'), (snapshot) => {
    occupiedNumbers = snapshot.val() || {};
    renderGrid();
    document.getElementById("loadingOverlay").classList.add("hidden");
    document.getElementById("statusDot").classList.add("online");
    document.getElementById("statusText").textContent = "Conectado — Números atualizados";
  });

  window.finalizePurchase = async function() {
    const name = document.getElementById("userName").value.trim();
    const phone = document.getElementById("userPhone").value.trim();

    if (!name || !phone) {
      showToast("⚠️ Preencha o seu nome e telefone!");
      return;
    }

    confirmBtn.disabled = true;
    confirmBtn.textContent = "A salvar reserva...";

    try {
      for (let n of selectedNumbers) {
        await set(ref(db, 'numbers/' + n), {
          owner: name,
          phone: phone,
          status: "reservado",
          timestamp: new Date().toISOString()
        });
      }

      const total = (selectedNumbers.length * PRICE).toFixed(2);
      document.getElementById("summaryBox").textContent = `Valor: R$ ${total} (${selectedNumbers.join(', ')})`;
      
      const textoWpp = `Olá! O meu nome é ${name}. Reservei os números: ${selectedNumbers.join(', ')}. Valor total: R$ ${total}. Segue o comprovante do Pix!`;
      document.getElementById("wppBtn").href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(textoWpp)}`;
      
      document.getElementById("pixModal").style.display = "flex";
      selectedNumbers = [];
      renderGrid();
    } catch (e) {
      showToast("Erro ao salvar. Verifique a sua ligação.");
      confirmBtn.disabled = false;
    }
  };

  window.copyPix = function() {
    navigator.clipboard.writeText(PIX_KEY);
    showToast("✅ Chave Pix copiada!");
  };

  window.closeModal = function() {
    document.getElementById("pixModal").style.display = "none";
    location.reload();
  };

  function showToast(m) {
    const t = document.getElementById("toast");
    t.textContent = m;
    t.style.opacity = "1";
    setTimeout(() => t.style.opacity = "0", 3000);
  }
</script>
</body>
</html>
