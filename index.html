<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa – Residentes em Resistência</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBkf-iRSkXntSERzft_b16zT1VeJly1c6A",
    authDomain: "rifa--residentes.firebaseapp.com",
    databaseURL: "https://rifa--residentes-default-rtdb.firebaseio.com",
    projectId: "rifa--residentes",
    storageBucket: "rifa--residentes.firebasestorage.app",
    messagingSenderId: "844916919267",
    appId: "1:844916919267:web:ac52339a5ac778e7bcaed6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const PIX_KEY = "094.736.199-52";
  const WHATSAPP_NUMBER = "554199826640";
  const PRICE_PER = 15; // Valor corrigido para 15 reais
  const TOTAL_NUMS = 200;

  let reservedData = {};
  let selectedNums = new Set();

  // Voltando para a pasta original "numbers" para recuperar seus dados
  const rifaRef = ref(db, "numbers"); 

  onValue(rifaRef, (snapshot) => {
    reservedData = snapshot.val() || {};
    buildGrid();
    updateUI();
  });

  function buildGrid() {
    const grid = document.getElementById("numbersGrid");
    grid.innerHTML = "";
    for (let i = 1; i <= TOTAL_NUMS; i++) {
      const numKey = i < 10 ? "0" + i : String(i);
      const taken = reservedData[numKey];
      const btn = document.createElement("button");
      btn.className = "num-btn" + (taken ? " taken" : "") + (selectedNums.has(i) ? " selected" : "");
      btn.textContent = numKey;
      btn.dataset.num = i;
      if (taken) {
        btn.title = "Reservado";
      } else {
        btn.onclick = () => toggleNum(i, btn);
      }
      grid.appendChild(btn);
    }
    updateCounters();
  }

  function toggleNum(n, btn) {
    if (selectedNums.has(n)) { selectedNums.delete(n); btn.classList.remove("selected"); }
    else { selectedNums.add(n); btn.classList.add("selected"); }
    updateUI();
  }

  function updateUI() { updateCounters(); updateSelDisplay(); updateTotal(); updateBtn(); }

  function updateCounters() {
    const taken = Object.keys(reservedData).length;
    const sel = selectedNums.size;
    document.getElementById("countAvail").textContent = Math.max(0, TOTAL_NUMS - taken - sel);
    document.getElementById("countSel").textContent = sel;
    document.getElementById("countTaken").textContent = taken;
  }

  function updateSelDisplay() {
    const box = document.getElementById("selDisplay");
    if (selectedNums.size === 0) { box.innerHTML = '<span class="empty-hint">Nenhum número selecionado ainda…</span>'; return; }
    const sorted = [...selectedNums].sort((a,b) => a-b);
    box.innerHTML = sorted.map(n => `<span class="sel-tag" onclick="removeNumGlobal(${n})">${n<10?"0"+n:n} ✕</span>`).join("");
  }

  function updateTotal() {
    document.getElementById("totalVal").textContent = "R$ " + (selectedNums.size * PRICE_PER).toFixed(2).replace(".",",");
  }

  function updateBtn() { document.getElementById("btnCheckout").disabled = selectedNums.size === 0; }

  window.removeNumGlobal = function(n) {
    selectedNums.delete(n);
    const btn = document.querySelector(`.num-btn[data-num="${n}"]`);
    if (btn) btn.classList.remove("selected");
    updateUI();
  };

  window.openModal = async function() {
    const name = document.getElementById("inputName").value.trim();
    const phone = document.getElementById("inputPhone").value.trim();
    if (!name) { showToast("⚠️ Digite seu nome!"); return; }
    if (!phone || phone.replace(/\D/g,"").length < 10) { showToast("⚠️ Digite um WhatsApp válido!"); return; }

    const snap = await get(rifaRef);
    const current = snap.val() || {};
    const conflict = [...selectedNums].filter(n => current[n < 10 ? "0"+n : String(n)]);
    
    if (conflict.length > 0) {
      showToast("⚠️ Alguém acabou de reservar o(s) número(s): " + conflict.join(", "));
      location.reload(); return;
    }

    try {
      for (const n of selectedNums) {
        const numKey = n < 10 ? "0" + n : String(n);
        await set(ref(db, "numbers/" + numKey), { name, phone, timestamp: new Date().toLocaleString("pt-BR") });
      }
    } catch(e) { showToast("❌ Erro ao salvar."); return; }

    const sorted = [...selectedNums].sort((a,b)=>a-b);
    const numsStr = sorted.map(n=>n<10?"0"+n:n).join(", ");
    const total = (selectedNums.size * PRICE_PER).toFixed(2).replace(".",",");

    document.getElementById("summaryBox").innerHTML =
      `<strong>Nome:</strong> ${name}<br><strong>Números:</strong> ${numsStr}<br><strong>Total:</strong> R$ ${total}`;

    const msg = encodeURIComponent(`🎟️ *Rifa - Residentes em Resistência*\n👤 Nome: ${name}\n🔢 Números: ${numsStr}\n💰 Total: R$ ${total}\n\nSegue comprovante do Pix! ✅`);
    document.getElementById("wppBtn").href = "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + msg;

    document.getElementById("pixModal").classList.add("open");
    selectedNums.clear();
    updateUI();
  };

  window.closeModal = () => { document.getElementById("pixModal").classList.remove("open"); location.reload(); };
  window.copyPix = () => navigator.clipboard.writeText(PIX_KEY).then(() => showToast("✅ Chave Pix copiada!"));

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }
</script>

    font-family: 'Lora', serif; min-height: 100vh; padding: 20px 10px 60px;

  .prize-badge { display: inline-flex; align-items: center; gap: 8px; background: white; border: 1.5px solid var(--gold); border-radius: 30px; padding: 8px 18px; margin-top: 14px; font-style: italic; color: var(--brown); }

  .basket-section { background: #f0e4ce; padding: 20px; text-align: center; border-bottom: 2px dashed var(--warm); }
  .basket-emoji { font-size: 3.5rem; display: block; }
  .item-tag { background: white; border: 1px solid var(--warm); border-radius: 20px; padding: 3px 12px; font-size: 0.78rem; color: var(--brown); display: inline-block; margin: 2px; }

  .price-bar { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--brown); padding: 12px; color: #fff8ee; }
  .price-bar strong { font-size: 1.4rem; color: var(--selected); font-family: 'Playfair Display', serif; }

  .about-section { background: #3d2008; padding: 25px; color: #fff8ee; }
  .about-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); margin-bottom: 15px; font-style: italic; }
  .about-text { font-size: 0.85rem; line-height: 1.7; margin-bottom: 10px; color: #e8d5b7; }

  .numbers-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; padding: 15px; }
  .num-btn {
    aspect-ratio: 1; border-radius: 6px; border: 1.5px solid #d4b896; background: var(--available);
